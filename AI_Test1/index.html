<div id="chatbox" style="position:fixed;bottom:20px;right:20px;width:300px;background:#fff;border:1px solid #ccc;padding:10px;border-radius:10px;">
  
  <div id="messages" style="height:200px;overflow:auto;border-bottom:1px solid #ccc;margin-bottom:10px;"></div>
  
  <input id="input" placeholder="Type message..." style="width:70%;" />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const msg = input.value;

  // Show user message
  document.getElementById("messages").innerHTML += "<div><b>You:</b> " + msg + "</div>";

  const response = await fetch("https://fanback-rosalie-touchingly.ngrok-free.dev/webhook/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "ngrok-skip-browser-warning": "true"
    },
    body: JSON.stringify({ message: msg })
  });

  const data = await response.json();

  // Show bot reply
  document.getElementById("messages").innerHTML += "<div><b>Bot:</b> " + data.reply + "</div>";

  input.value = "";
}
</script>
